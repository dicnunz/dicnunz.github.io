t:100%;width:0;border-radius:9px;transition:width .65s cubic-bezier(.2,.9,.2,1)}.fill.sol{background:var(--sol)}.fill.old{background:var(--old)}.val{color:var(--ink);font-weight:750;text-align:right;font-variant-numeric:tabular-nums}.foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}.why{font-size:10px;color:#777c8b;max-width:75%;line-height:1.35}.reset{border:1px solid var(--line);border-radius:99px;background:#ffffff08;color:var(--ink);padding:8px 10px;font-size:10px;font-weight:750}.complete{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:24px;background:#07080dd9;backdrop-filter:blur(18px);opacity:0;visibility:hidden;transition:.35s}.complete.show{opacity:1;visibility:visible}.complete>div{width:min(100%,390px);padding:25px;border:1px solid var(--line);border-radius:29px;background:#0d1019}.complete h2{font-size:38px;line-height:.92;letter-spacing:-.06em;margin:0 0 14px}.complete p{font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 20px}.again{width:100%;height:52px;border:0;border-radius:17px;background:var(--ink);color:#0b0c11;font-weight:800}.source{display:block;text-align:center;margin-top:12px;color:#777c8b;font-size:10px;text-decoration:none}@keyframes turn{to{transform:rotate(360deg)}}@keyframes back{to{rotate:-360deg}}@keyframes breathe{50%{transform:scale(1.035);box-shadow:0 0 90px #ffca6240,0 0 0 1px #ffdf8f38}}@keyframes pop{50%{scale:1.24}}@media(max-height:700px){.orbit{width:min(70vw,300px)}.node{width:42px;height:42px;margin:-21px}.node small{display:none}.core{width:100px;height:100px}.panel{min-height:116px;padding:13px}.rows{margin-top:10px}}</style></head><body><div class="app"><header><div><div class="k">Official OpenAI evals</div><div class="title">GPT‑5.6 Sol Field</div></div><div class="count" id="count">0 / 12</div></header><main><div class="stage"><div class="orbit" id="orbit"><div class="core"><div><strong id="core">5.6</strong><span>tap a node</span></div></div></div><div class="hint">Tap every orbiting benchmark</div></div></main><section class="panel"><div class="topline"><div class="name" id="name">Choose a benchmark</div><div class="delta" id="delta">Sol vs 5.5</div></div><div class="rows"><div class="row"><span>5.6 Sol</span><div class="track"><div class="fill sol" id="sol"></div></div><span class="val" id="sv">—</span></div><div class="row"><span>GPT‑5.5</span><div class="track"><div class="fill old" id="old"></div></div><span class="val" id="ov">—</span></div></div><div class="foot"><div class="why" id="why">Twelve published comparisons across coding, science, browsing, computer use, and cybersecurity.</div><button class="reset" id="reset">Reset</button></div></section></div><div class="complete" id="complete"><div><h2>Frontier mapped.</h2><p id="summary"></p><button class="again" id="again">Run it again</button><a class="source" href="https://openai.com/index/gpt-5-6/" target="_blank" rel="noreferrer">Official OpenAI source ↗</a></div></div><script>const D=[['Agents’ Last Exam',52.7,46.9,'Professional workflows'],['Coding Agent Index',80,76.4,'Coding agents'],['SWE‑Bench Pro',64.6,59.4,'Real software engineering'],['Terminal‑Bench 2.1',88.8,85.6,'Terminal workflows'],['GeneBench Pro',28.7,12,'Genomics research'],['LifeSciBench',59.9,50.4,'Life-science research'],['HealthBench Pro',60.5,49.5,'Professional health tasks'],['OSWorld 2.0',62.6,47.5,'Computer use'],['BrowseComp',90.4,84.4,'Agentic browsing'],['BenchCAD',70.6,44.4,'CAD computer use'],['SEC‑Bench Pro',71.2,45.8,'Cybersecurity'],['ExploitBench',73.5,47.9,'Vulnerability research']];const q=s=>document.querySelector(s),orbit=q('#orbit'),seen=new Set;D.forEach((d,i)=>{let b=document.createElement('button'),a=i*30-90,r=i%2?138:172;b.className='node';b.style.setProperty('--a',a+'deg');b.style.setProperty('--r','min('+r+'px,'+(i%2?35:42)+'vw)');b.innerHTML='<small>'+d[0]+'</small>';b.onclick=()=>scan(i,b);orbit.appendChild(b)});function scan(i,b){let d=D[i],gap=d[1]-d[2];b.classList.remove('hit');void b.offsetWidth;b.classList.add('hit','done');seen.add(i);q('#count').textContent=seen.size+' / '+D.length;q('#name').textContent=d[0];q('#delta').textContent='+'+gap.toFixed(1)+' pts';q('#why').textContent=d[3]+' · higher is better';q('#sv').textContent=d[1].toFixed(1);q('#ov').textContent=d[2].toFixed(1);q('#sol').style.width=d[1]+'%';q('#old').style.width=d[2]+'%';q('#core').textContent='+'+gap.toFixed(1);navigator.vibrate?.(12);if(seen.size===D.length)setTimeout(done,500)}function done(){let avg=D.reduce((s,d)=>s+d[1]-d[2],0)/D.length;q('#summary').textContent='Sol leads all 12 selected comparisons by an average of '+avg.toFixed(1)+' points.';q('#complete').classList.add('show')}function reset(){seen.clear();document.querySelectorAll('.node').forEach(n=>n.classList.remove('done'));q('#count').textContent='0 / 12';q('#name').textContent='Choose a benchmark';q('#delta').textContent='Sol vs 5.5';q('#why').textContent='Twelve published comparisons across coding, science, browsing, computer use, and cybersecurity.';q('#sv').textContent=q('#ov').textContent='—';q('#sol').style.width=q('#old').style.width='0';q('#core').textContent='5.6';q('#complete').classList.remove('show')}q('#reset').onclick=reset;q('#again').onclick=reset;</script></body></html>
